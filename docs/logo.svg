    <path d="M94 132L108 146L134 116" stroke="#16A34A" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M112 48V34M147 62L157 52M163 101H177M77 62L67 52M61 101H47" stroke="#FDE68A" stroke-width="6" stroke-linecap="round"/>
