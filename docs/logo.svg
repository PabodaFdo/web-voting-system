<svg width="760" height="220" viewBox="0 0 760 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Bright Future logo</title>
  <desc id="desc">A sunrise ballot mark beside the Bright Future wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="760" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#061827"/>
      <stop offset="0.52" stop-color="#0B2F45"/>
      <stop offset="1" stop-color="#123524"/>
    </linearGradient>
    <linearGradient id="sun" x1="73" y1="50" x2="154" y2="151" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDE68A"/>
      <stop offset="0.48" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="word" x1="205" y1="63" x2="590" y2="118" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.5" stop-color="#BAE6FD"/>
      <stop offset="1" stop-color="#BBF7D0"/>
    </linearGradient>
    <filter id="glow" x="28" y="18" width="166" height="166" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.22 0 0 0 0 0.74 0 0 0 0 0.97 0 0 0 0.42 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="760" height="220" rx="32" fill="url(#bg)"/>
  <path d="M32 177C143 127 240 130 350 165C457 199 592 201 728 142" stroke="#7DD3FC" stroke-opacity="0.12" stroke-width="38" stroke-linecap="round"/>
  <path d="M30 58C142 88 248 83 337 49C462 1 585 25 731 73" stroke="#BBF7D0" stroke-opacity="0.1" stroke-width="24" stroke-linecap="round"/>

  <g filter="url(#glow)">
