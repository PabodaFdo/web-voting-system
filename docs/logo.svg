  <text x="209" y="137" fill="#C8E7F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="600">Student Awards Voting System</text>

  <rect x="210" y="158" width="132" height="30" rx="15" fill="#22C55E" opacity="0.16"/>
  <text x="235" y="179" fill="#BBF7D0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">Spring Boot</text>
  <rect x="354" y="158" width="92" height="30" rx="15" fill="#38BDF8" opacity="0.16"/>
